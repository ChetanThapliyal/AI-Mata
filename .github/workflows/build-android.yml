name: Build Android APK

on:
  push:
    branches: [main, "security/**"]
    paths:
      - "android-app/**"
  pull_request:
    branches: [main]
    paths:
      - "android-app/**"
  workflow_dispatch:

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Inject API_TOKEN into local.properties
        run: |
          echo "API_TOKEN=${{ secrets.API_TOKEN }}" >> android-app/local.properties

      - name: Build Debug APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matriarch-ai-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 7
